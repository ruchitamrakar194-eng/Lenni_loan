<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Notification</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; margin: 0; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; background-color: #ffffff; border-radius: 16px; border: 1px solid #e2e8f0; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    .header { background: linear-gradient(135deg, #2563eb, #1e3a8a); padding: 40px 30px; text-align: center; color: #ffffff; }
    .header h1 { margin: 0; font-size: 28px; font-weight: 800; }
    .content { padding: 40px 30px; line-height: 1.6; color: #334155; }
    .footer { padding: 20px 30px; background-color: #f1f5f9; text-align: center; font-size: 11px; color: #64748b; border-top: 1px solid #e2e8f0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Lenni Notification</h1>
    </div>
    <div class="content">
      <h3 style="margin-top:0; color:#0f172a;">Hello,</h3>
      <p>{{message}}</p>
      <p>Please log into your portal to see more information or manage your active records.</p>
    </div>
    <div class="footer">
      This is an automated workflow transmission from Lenni Loan Management System. Please do not reply.<br>
      &copy; {{year}} Lenni. All rights reserved.
    </div>
  </div>
</body>
</html>
